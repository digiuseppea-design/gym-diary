name: Pubblica Gym Diary su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v6

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepara il sito
        run: |
          mkdir _site
          cp index.html .nojekyll _site/
          cp -R app mockup _site/

      - name: Prepara i file statici
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Pubblica il sito
        id: deployment
        uses: actions/deploy-pages@v4
